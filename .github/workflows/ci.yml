name: CI Pipeline

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fenreads
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: fenreads_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test tests/FenReads.Domain.Tests/FenReads.Domain.Tests.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=domain-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage"

          dotnet test tests/FenReads.Application.Tests/FenReads.Application.Tests.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=application-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage"

          dotnet test tests/FenReads.Infrastructure.Tests/FenReads.Infrastructure.Tests.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=infrastructure-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage"

      - name: Run integration tests
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=fenreads_test;Username=fenreads;Password=test_password"
          ConnectionStrings__Redis: "localhost:6379"
        run: |
          dotnet test tests/FenReads.Api.IntegrationTests/FenReads.Api.IntegrationTests.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=api-integration-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage"

          dotnet test tests/FenReads.Infrastructure.IntegrationTests/FenReads.Infrastructure.IntegrationTests.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=infrastructure-integration-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/*.trx
            **/coverage.cobertura.xml

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

      - name: Code Coverage Report
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Check code formatting
        run: |
          dotnet format --verify-no-changes --verbosity diagnostic

      - name: Run security scan
        run: |
          dotnet list package --vulnerable --include-transitive

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [build-and-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/FenReads.Api/Dockerfile
          push: false
          tags: fenreads-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job de statut pour les PR
  pr-check:
    name: PR Status Check
    if: always()
    needs: [build-and-test, code-quality]
    runs-on: ubuntu-latest
    
    steps:
      - name: Check build and test status
        if: needs.build-and-test.result != 'success' || needs.code-quality.result != 'success'
        run: |
          echo "Build or tests failed!"
          exit 1
      
      - name: PR check passed
        run: echo "All checks passed successfully!"